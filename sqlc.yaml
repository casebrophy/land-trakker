version: "2"
sql:
  - engine: "postgresql"
    queries: "./storage/queries"
    schema: "./storage/migrations"
    gen:
      go:
        package: "db"
        out: "./storage/db"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "geometry"
            nullable: true
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Text"
          - db_type: "geometry"
            nullable: false
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Text"
