<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Land Trakker — Listings</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow mb-6">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <span class="text-xl font-bold text-blue-700">Land Trakker</span>
            <a href="/logout" class="text-sm text-gray-600 hover:text-red-600">Logout</a>
        </div>
    </nav>
    <div class="max-w-6xl mx-auto px-4">
        <h2 class="text-xl font-semibold mb-4">Listings</h2>
        <div class="overflow-x-auto bg-white rounded shadow">
            <table class="min-w-full text-sm">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="px-4 py-2 text-left font-medium text-gray-600">Title</th>
                        <th class="px-4 py-2 text-left font-medium text-gray-600">Status</th>
                        <th class="px-4 py-2 text-left font-medium text-gray-600">Price/Acre</th>
                        <th class="px-4 py-2 text-left font-medium text-gray-600">Acres</th>
                        <th class="px-4 py-2 text-left font-medium text-gray-600">Location</th>
                        <th class="px-4 py-2 text-left font-medium text-gray-600">First Seen</th>
                        <th class="px-4 py-2"></th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    {{range .Rows}}
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-2">{{.Title}}</td>
                        <td class="px-4 py-2">
                            <span class="px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-700">{{.Status}}</span>
                        </td>
                        <td class="px-4 py-2">{{.PricePerAcre}}</td>
                        <td class="px-4 py-2">{{.Acres}}</td>
                        <td class="px-4 py-2">{{.Location}}</td>
                        <td class="px-4 py-2">{{.FirstSeenDate}}</td>
                        <td class="px-4 py-2">
                            <a href="/listings/{{.ID}}" class="text-blue-600 hover:underline text-xs">View</a>
                        </td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
