<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Land Trakker — Search</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow mb-4">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <span class="text-xl font-bold text-blue-700">Land Trakker</span>
            <a href="/logout" class="text-sm text-gray-600 hover:text-red-600">Logout</a>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 pb-8">
        <!-- Filter form -->
        <form id="filter-form" hx-get="/" hx-target="#results" hx-push-url="true"
              class="bg-white rounded shadow p-4 mb-4">
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Search</label>
                    <input name="q" type="text" value="{{.Filter.Query}}" placeholder="title, location, …"
                           class="w-full border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Acres Min</label>
                    <input name="acres_min" type="number" step="0.01" min="0"
                           value="{{.Filter.AcresMin}}" placeholder="e.g. 5"
                           class="w-full border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Acres Max</label>
                    <input name="acres_max" type="number" step="0.01" min="0"
                           value="{{.Filter.AcresMax}}" placeholder="e.g. 500"
                           class="w-full border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Price Min ($)</label>
                    <input name="price_min" type="number" min="0"
                           value="{{.Filter.PriceMin}}" placeholder="e.g. 50000"
                           class="w-full border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Price Max ($)</label>
                    <input name="price_max" type="number" min="0"
                           value="{{.Filter.PriceMax}}" placeholder="e.g. 1000000"
                           class="w-full border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Counties</label>
                    <input name="counties" type="text" value="{{.Filter.Counties}}"
                           placeholder="Ada, Bonner, …"
                           class="w-full border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Property Type</label>
                    <input name="property_type" type="text" value="{{.Filter.PropertyType}}"
                           placeholder="e.g. ranch"
                           class="w-full border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400">
                </div>
            </div>
            <div class="flex flex-wrap items-center gap-4 mt-3">
                <label class="flex items-center gap-1.5 text-sm text-gray-700 cursor-pointer">
                    <input type="checkbox" name="attr_water" value="true"
                           {{if .Filter.AttrWater}}checked{{end}} class="accent-blue-600">
                    Water Frontage
                </label>
                <label class="flex items-center gap-1.5 text-sm text-gray-700 cursor-pointer">
                    <input type="checkbox" name="attr_off_grid" value="true"
                           {{if .Filter.AttrOffGrid}}checked{{end}} class="accent-blue-600">
                    Off Grid
                </label>
                <label class="flex items-center gap-1.5 text-sm text-gray-700 cursor-pointer">
                    <input type="checkbox" name="attr_power" value="true"
                           {{if .Filter.AttrPower}}checked{{end}} class="accent-blue-600">
                    Power
                </label>
                <label class="flex items-center gap-1.5 text-sm text-gray-700 cursor-pointer">
                    <input type="checkbox" name="attr_well" value="true"
                           {{if .Filter.AttrWell}}checked{{end}} class="accent-blue-600">
                    Well
                </label>
                <label class="flex items-center gap-1.5 text-sm text-gray-700 cursor-pointer">
                    <input type="checkbox" name="attr_septic" value="true"
                           {{if .Filter.AttrSeptic}}checked{{end}} class="accent-blue-600">
                    Septic
                </label>
                <button type="submit"
                        class="ml-auto px-4 py-1.5 bg-blue-600 text-white text-sm rounded hover:bg-blue-700">
                    Search
                </button>
            </div>
        </form>

        <!-- Leaflet map -->
        <div id="map" class="rounded shadow mb-4" style="height: 400px;"></div>

        <!-- Results (HTMX swap target) -->
        <div id="results">
            {{template "results_content" .}}
        </div>
    </div>

    <script>
    var ltMap = L.map('map').setView([44.5, -114.0], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 18
    }).addTo(ltMap);

    var ltMarkers = [];

    function updateMapMarkers(data) {
        ltMarkers.forEach(function(m) { m.remove(); });
        ltMarkers = [];
        if (!data || !data.length) { return; }
        data.forEach(function(item) {
            var m = L.marker([item.lat, item.lng])
                .bindPopup('<a href="/listings/' + item.id + '">' + item.title + '</a>')
                .addTo(ltMap);
            ltMarkers.push(m);
        });
        var group = L.featureGroup(ltMarkers);
        ltMap.fitBounds(group.getBounds(), {padding: [30, 30]});
    }

    updateMapMarkers({{.Markers}});

    // After HTMX swaps the results div, run the embedded marker-update script.
    document.body.addEventListener('htmx:afterSettle', function(evt) {
        if (evt.detail && evt.detail.target && evt.detail.target.id === 'results') {
            var el = document.querySelector('#results script');
            if (el) { eval(el.textContent); }
        }
    });
    </script>
</body>
</html>
