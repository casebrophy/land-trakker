<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Land Trakker — Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow mb-4">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <span class="text-xl font-bold text-blue-700">Land Trakker</span>
            <a href="/logout" class="text-sm text-gray-600 hover:text-red-600">Logout</a>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 pb-8">
        <h1 class="text-2xl font-semibold text-gray-800 mb-6">Logs</h1>

        <!-- Filter form -->
        <div class="bg-white rounded shadow p-4 mb-6">
            <form method="get" class="flex gap-2">
                <input
                    type="text"
                    name="q"
                    placeholder="Filter logs (e.g. error, warning)..."
                    value="{{.Query}}"
                    class="flex-1 px-3 py-2 border border-gray-300 rounded text-sm"
                />
                <input
                    type="hidden"
                    name="limit"
                    value="{{.Limit}}"
                />
                <button
                    type="submit"
                    class="px-4 py-2 bg-blue-600 text-white rounded text-sm font-medium hover:bg-blue-700"
                >
                    Filter
                </button>
                {{if .Query}}
                <a
                    href="/health/logs"
                    class="px-4 py-2 bg-gray-300 text-gray-800 rounded text-sm font-medium hover:bg-gray-400"
                >
                    Clear
                </a>
                {{end}}
            </form>
        </div>

        <!-- Logs display -->
        {{if .Logs}}
        <div class="bg-white rounded shadow p-4">
            <pre class="text-sm text-gray-700 whitespace-pre-wrap break-words font-mono">{{range .Logs}}{{.}}
{{end}}</pre>
        </div>
        {{else}}
        <div class="bg-white rounded shadow p-4 text-center text-gray-500">
            {{if .Query}}
                No logs matching "{{.Query}}"
            {{else}}
                No logs available
            {{end}}
        </div>
        {{end}}
    </div>
</body>
</html>
