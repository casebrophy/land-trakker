<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Land Trakker — {{if .IsEdit}}Edit Search{{else}}New Search{{end}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow mb-4">
        <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <a href="/" class="text-xl font-bold text-blue-700">Land Trakker</a>
                <a href="/searches" class="text-sm font-medium text-blue-600">Saved Searches</a>
                <a href="/digest" class="text-sm text-gray-600 hover:text-blue-600">Digest</a>
            </div>
            <a href="/logout" class="text-sm text-gray-600 hover:text-red-600">Logout</a>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-4 pb-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">
            {{if .IsEdit}}Edit Saved Search{{else}}New Saved Search{{end}}
        </h1>

        <form method="POST" action="{{.ActionURL}}" class="bg-white rounded shadow p-6 space-y-6">
            <!-- Name + Enabled -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="sm:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Search Name <span class="text-red-500">*</span></label>
                    <input name="name" type="text" required
                           value="{{.Name}}"
                           placeholder="e.g. Idaho 40ac under $500k"
                           class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                    <div class="flex items-center gap-2 mt-2">
                        <input type="checkbox" name="enabled" value="true" id="enabled"
                               {{if .Enabled}}checked{{end}}
                               class="accent-blue-600 w-4 h-4">
                        <label for="enabled" class="text-sm text-gray-700 cursor-pointer">Enabled</label>
                    </div>
                </div>
            </div>

            <!-- Filter fields -->
            <div>
                <h2 class="text-sm font-semibold text-gray-700 mb-3 border-b pb-1">Filter Criteria</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Acres Min</label>
                        <input name="acres_min" type="number" step="0.01" min="0"
                               value="{{.Filter.AcresMin}}" placeholder="e.g. 10"
                               class="w-full border rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Acres Max</label>
                        <input name="acres_max" type="number" step="0.01" min="0"
                               value="{{.Filter.AcresMax}}" placeholder="e.g. 500"
                               class="w-full border rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Price Min ($)</label>
                        <input name="price_min" type="number" min="0"
                               value="{{.Filter.PriceMin}}" placeholder="e.g. 50000"
                               class="w-full border rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Price Max ($)</label>
                        <input name="price_max" type="number" min="0"
                               value="{{.Filter.PriceMax}}" placeholder="e.g. 1000000"
                               class="w-full border rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400">
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Counties (comma-separated)</label>
                        <input name="counties" type="text" value="{{.Filter.Counties}}"
                               placeholder="Ada, Bonner, Blaine"
                               class="w-full border rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Property Type</label>
                        <input name="property_type" type="text" value="{{.Filter.PropertyType}}"
                               placeholder="e.g. ranch"
                               class="w-full border rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400">
                    </div>
                </div>
                <div class="flex flex-wrap items-center gap-4 mt-3">
                    <label class="flex items-center gap-1.5 text-sm text-gray-700 cursor-pointer">
                        <input type="checkbox" name="attr_water" value="true"
                               {{if .Filter.AttrWater}}checked{{end}} class="accent-blue-600">
                        Water Frontage
                    </label>
                    <label class="flex items-center gap-1.5 text-sm text-gray-700 cursor-pointer">
                        <input type="checkbox" name="attr_off_grid" value="true"
                               {{if .Filter.AttrOffGrid}}checked{{end}} class="accent-blue-600">
                        Off Grid
                    </label>
                    <label class="flex items-center gap-1.5 text-sm text-gray-700 cursor-pointer">
                        <input type="checkbox" name="attr_power" value="true"
                               {{if .Filter.AttrPower}}checked{{end}} class="accent-blue-600">
                        Power
                    </label>
                    <label class="flex items-center gap-1.5 text-sm text-gray-700 cursor-pointer">
                        <input type="checkbox" name="attr_well" value="true"
                               {{if .Filter.AttrWell}}checked{{end}} class="accent-blue-600">
                        Well
                    </label>
                    <label class="flex items-center gap-1.5 text-sm text-gray-700 cursor-pointer">
                        <input type="checkbox" name="attr_septic" value="true"
                               {{if .Filter.AttrSeptic}}checked{{end}} class="accent-blue-600">
                        Septic
                    </label>
                </div>
            </div>

            <!-- Buttons -->
            <div class="flex items-center gap-3 pt-2 border-t">
                <button type="submit"
                        class="px-5 py-2 bg-blue-600 text-white text-sm rounded hover:bg-blue-700">
                    {{if .IsEdit}}Save Changes{{else}}Create Search{{end}}
                </button>
                <a href="/searches" class="px-5 py-2 text-sm text-gray-600 hover:text-gray-900">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
