<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Land Trakker — Saved Searches</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow mb-4">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <a href="/" class="text-xl font-bold text-blue-700">Land Trakker</a>
                <a href="/searches" class="text-sm font-medium text-blue-600">Saved Searches</a>
                <a href="/digest" class="text-sm text-gray-600 hover:text-blue-600">Digest</a>
            </div>
            <a href="/logout" class="text-sm text-gray-600 hover:text-red-600">Logout</a>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 pb-8">
        <div class="flex items-center justify-between mb-4">
            <h1 class="text-2xl font-bold text-gray-800">Saved Searches</h1>
            <a href="/searches/new"
               class="px-4 py-2 bg-blue-600 text-white text-sm rounded hover:bg-blue-700">
                + New Search
            </a>
        </div>

        {{if .Searches}}
        <div class="space-y-3">
            {{range .Searches}}
            <div class="bg-white rounded shadow p-4 flex items-start justify-between gap-4">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="font-semibold text-gray-900">{{.Name}}</span>
                        {{if .Enabled}}
                        <span class="text-xs px-2 py-0.5 bg-green-100 text-green-700 rounded-full">enabled</span>
                        {{else}}
                        <span class="text-xs px-2 py-0.5 bg-gray-100 text-gray-500 rounded-full">disabled</span>
                        {{end}}
                    </div>
                    <p class="text-sm text-gray-600 truncate">{{.FilterSummary}}</p>
                    <p class="text-xs text-gray-400 mt-1">Created {{.CreatedAt}}</p>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    <a href="/searches/{{.ID}}/edit"
                       class="px-3 py-1 text-sm border border-gray-300 rounded hover:bg-gray-50">
                        Edit
                    </a>
                    <form method="POST" action="/searches/{{.ID}}/delete"
                          onsubmit="return confirm('Delete this saved search?')">
                        <button type="submit"
                                class="px-3 py-1 text-sm border border-red-300 text-red-600 rounded hover:bg-red-50">
                            Delete
                        </button>
                    </form>
                </div>
            </div>
            {{end}}
        </div>
        {{else}}
        <div class="bg-white rounded shadow p-8 text-center text-gray-500">
            No saved searches yet. <a href="/searches/new" class="text-blue-600 hover:underline">Create one</a> to get daily alerts.
        </div>
        {{end}}
    </div>
</body>
</html>
